spring:
  application:
    name: fowoco-server
  profiles:
    default: local
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
  jackson:
    property-naming-strategy: SNAKE_CASE
    time-zone: UTC
    deserialization:
      fail-on-unknown-properties: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  auth:
    jwt:
      issuer: ${JWT_ISSUER:fowoco-server}
      audience: ${JWT_AUDIENCE:fowoco-client}
      access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:15m}
    refresh-token:
      ttl: ${REFRESH_TOKEN_TTL:14d}
      cookie:
        name: ${REFRESH_TOKEN_COOKIE_NAME:fowoco_refresh_token}
        path: /api/v1/auth
        same-site: ${REFRESH_TOKEN_COOKIE_SAME_SITE:Strict}

logging:
  pattern:
    level: "%5p [request_id:%X{request_id:--}]"
---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:fowoco;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
server:
  address: 127.0.0.1
app:
  auth:
    jwt:
      secret-base64: ${JWT_SECRET_BASE64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
    refresh-token:
      cookie:
        secure: ${REFRESH_TOKEN_COOKIE_SECURE:false}
---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fowoco}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: true
app:
  auth:
    jwt:
      issuer: ${JWT_ISSUER:fowoco-server-dev}
      audience: ${JWT_AUDIENCE:fowoco-client-dev}
      secret-base64: ${JWT_SECRET_BASE64}
    refresh-token:
      cookie:
        secure: ${REFRESH_TOKEN_COOKIE_SECURE:true}
---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:fowoco-test-${random.uuid};MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    show-sql: false
  h2:
    console:
      enabled: false
app:
  auth:
    jwt:
      secret-base64: ${JWT_SECRET_BASE64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
    refresh-token:
      cookie:
        secure: false
---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false
  h2:
    console:
      enabled: false
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  auth:
    jwt:
      issuer: ${JWT_ISSUER}
      audience: ${JWT_AUDIENCE}
      secret-base64: ${JWT_SECRET_BASE64}
    refresh-token:
      cookie:
        secure: ${REFRESH_TOKEN_COOKIE_SECURE:true}

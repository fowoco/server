name: 기능 제안
description: 구현 방향이 합의된 사용자 기능을 제안합니다.
title: "[Feature] "
labels:
  - type:feature
  - status:backlog
body:
  - type: markdown
    attributes:
      value: |
        해결 방법이 아직 정해지지 않았다면 Issue보다 [Discussion](https://github.com/fowoco/server/discussions)이 먼저입니다.
  - type: textarea
    id: problem
    attributes:
      label: 사용자가 겪는 문제
      description: 누가 어떤 상황에서 무엇을 놓치는지 적어 주세요.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: 원하는 결과
      description: 기능이 끝나면 사용자가 무엇을 할 수 있어야 하나요?
    validations:
      required: true
  - type: textarea
    id: flow
    attributes:
      label: 사용자 흐름
      placeholder: |
        1. 사용자가 ...
        2. 서버가 ...
        3. 사용자가 결과를 ...
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: 완료 조건과 범위 밖
      description: 테스트 가능한 완료 조건과 이번에 하지 않을 내용을 적어 주세요.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: 개인정보 확인
      options:
        - label: 실제 근로자 정보·토큰·Secret을 포함하지 않았습니다.
          required: true

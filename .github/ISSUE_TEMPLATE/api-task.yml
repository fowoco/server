name: API 구현 작업
description: Server API 카탈로그의 endpoint 구현·변경 작업을 작성합니다.
title: "[API] "
labels:
  - area:server
  - status:backlog
body:
  - type: markdown
    attributes:
      value: |
        먼저 [API 카탈로그](https://github.com/fowoco/server/wiki/09-API-Specification)에서 기존 소유 Issue가 있는지 확인하세요. 중복이면 새 이슈 대신 기존 이슈를 보완합니다.
  - type: input
    id: endpoint
    attributes:
      label: Method와 Path
      placeholder: POST /api/v1/tasks/{taskId}/approve
    validations:
      required: true
  - type: dropdown
    id: domain
    attributes:
      label: API 영역
      options:
        - 인증
        - 근로자
        - 문서·파일
        - 업무카드·Workflow
        - AI 분석
        - 승인·감사
        - 근로자 보안 링크
        - 파일 가져오기
        - 대시보드
        - 설정
        - 운영·배포
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - P0 - 데모 핵심
        - P1 - 중요한 사용성
        - P2 - 후속 보완
    validations:
      required: true
  - type: textarea
    id: user_goal
    attributes:
      label: 사용자는 무엇을 할 수 있나요?
      description: 구현 기술보다 사용자 결과를 먼저 적어 주세요.
    validations:
      required: true
  - type: textarea
    id: contract
    attributes:
      label: 요청·응답·오류 계약
      description: DTO 핵심 필드, 상태 코드, 오류 코드, Idempotency를 요약하고 Notion 링크를 연결하세요.
    validations:
      required: true
  - type: textarea
    id: implementation
    attributes:
      label: 초보자용 구현 순서
      placeholder: |
        1. Request/Response DTO
        2. Controller
        3. 권한·상태 규칙 Service
        4. Repository와 migration
        5. 테스트와 Swagger
    validations:
      required: true
  - type: checkboxes
    id: security
    attributes:
      label: 보안·완료 조건
      options:
        - label: 인증 역할과 company_id 격리 규칙을 정의했습니다.
          required: true
        - label: 민감정보·토큰·Secret을 DTO·로그·AI 입력에서 제외했습니다.
          required: true
        - label: 정상·검증 실패·권한 부족·타 사업장 테스트를 계획했습니다.
          required: true
        - label: Swagger·Notion·Client 동기화 범위를 적었습니다.
          required: true
  - type: textarea
    id: dependencies
    attributes:
      label: 선행 Issue·범위 밖·참고 링크
      description: 선행 작업, 이번에 하지 않을 것, Figma·Notion·Discussion 링크를 적어 주세요.
